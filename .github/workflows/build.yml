name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential yosys kicad

    - name: Run synthesis test
      run: |
        cd synthesis
        bash run_synth.sh

    - name: Verify results
      run: |
        ls -la synthesis/results/
        echo "Synthesis completed successfully"
