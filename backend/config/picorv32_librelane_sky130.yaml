DESIGN_NAME: picorv32
VERILOG_FILES: dir::src/*.v
CLOCK_PORT: clk
CLOCK_PERIOD: 20
PNR_SDC_FILE: dir::src/picorv32.sdc
SIGNOFF_SDC_FILE: dir::src/picorv32.sdc

# Conservative floorplan/routing settings verified clean for SKY130 signoff.
FP_CORE_UTIL: 8
PL_TARGET_DENSITY: 0.18
DIE_AREA: [0, 0, 1200, 1200]
FP_PDN_MULTILAYER: false
RT_MIN_LAYER: met2
RT_MAX_LAYER: met5
RUN_ANTENNA_REPAIR: true
GRT_ANTENNA_REPAIR_ITERS: 1
GRT_ANTENNA_REPAIR_MARGIN: 20
DRT_ANTENNA_REPAIR_ITERS: 0
RUN_HEURISTIC_DIODE_INSERTION: true
HEURISTIC_ANTENNA_THRESHOLD: 160
GPL_CELL_PADDING: 1
DPL_CELL_PADDING: 1
RUN_POST_GRT_DESIGN_REPAIR: true
GRT_DESIGN_REPAIR_MAX_WIRE_LENGTH: 120
GRT_DESIGN_REPAIR_MAX_CAP_PCT: 10
GRT_DESIGN_REPAIR_MAX_SLEW_PCT: 10
RUN_POST_GRT_RESIZER_TIMING: true
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.10
GRT_RESIZER_HOLD_MAX_BUFFER_PCT: 80
GRT_RESIZER_FIX_HOLD_FIRST: true
DESIGN_REPAIR_MAX_CAP_PCT: 10
DESIGN_REPAIR_MAX_SLEW_PCT: 10

DECAP_CELLS: []
FILL_CELLS:
  - sky130_fd_sc_hd__fill_8
  - sky130_fd_sc_hd__fill_4
  - sky130_fd_sc_hd__fill_2
  - sky130_fd_sc_hd__fill_1
CELL_SPICE_MODELS: []

RUN_IRDROP_REPORT: false
PRIMARY_GDSII_STREAMOUT_TOOL: magic
MAGIC_DEF_NO_BLOCKAGES: true
MAGIC_EXT_USE_GDS: false
MAGIC_EXT_ABSTRACT: true
MAGIC_EXT_UNIQUE: none
