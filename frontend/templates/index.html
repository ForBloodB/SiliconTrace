                    node.attachments = node.attachments || [];
                    node.attachments.push(data.file);
                    saveFlow();
                    renderAll();
                }
                toast('上下文文件已上传');
            } catch (error) {
                toast(error.message);
            }
        }

        function wireEvents() {
            $('palette').addEventListener('dragstart', (event) => {
                const item = event.target.closest('[data-node-type]');
                if (!item) return;
                event.dataTransfer.setData('text/node-type', item.dataset.nodeType);
            });

            $('canvasViewport').addEventListener('dragover', (event) => event.preventDefault());
            $('canvasViewport').addEventListener('drop', (event) => {
                event.preventDefault();
                const type = event.dataTransfer.getData('text/node-type');
                if (!type) return;
                const rect = $('canvasSpace').getBoundingClientRect();
                addNode(type, Math.max(20, event.clientX - rect.left - 80), Math.max(20, event.clientY - rect.top - 22));
            });

            $('canvasViewport').addEventListener('pointerdown', (event) => {
                if (event.button !== 0) return;
                if (event.target.closest('.flow-node') || event.target.closest('.edge-hit')) return;
                panning = {
                    startX: event.clientX,
                    startY: event.clientY,
                    scrollLeft: $('canvasViewport').scrollLeft,
                    scrollTop: $('canvasViewport').scrollTop,
                };
                $('canvasViewport').style.cursor = 'grabbing';
            });

            $('rightResizer').addEventListener('pointerdown', (event) => {
                if (event.button !== 0) return;
                const rightPanel = document.querySelector('.right-panel');
                resizingRightPanel = {
                    startX: event.clientX,
                    startWidth: rightPanel?.getBoundingClientRect().width || 360,
                };
                $('rightResizer').classList.add('resizing');
                document.body.classList.add('resizing-right-panel');
                event.currentTarget.setPointerCapture?.(event.pointerId);
                event.preventDefault();
            });

            $('nodesLayer').addEventListener('pointerdown', (event) => {
                const outPort = event.target.closest('[data-port="out"]');
                if (!outPort) return;
                const nodeEl = event.target.closest('.flow-node');
                if (!nodeEl) return;
                const node = flow.nodes.find((item) => item.id === nodeEl.dataset.nodeId);
                if (!node) return;
                const point = clientToCanvas(event.clientX, event.clientY);
                connectingFrom = node.id;
                pendingEdge = { source: node.id, x: point.x, y: point.y, startX: event.clientX, startY: event.clientY, moved: false };
                suppressPortClick = true;
                outPort.setPointerCapture?.(event.pointerId);
                event.preventDefault();
                event.stopPropagation();
                renderNodes();
                renderEdges();
            });

            $('nodesLayer').addEventListener('mousedown', (event) => {
                const nodeEl = event.target.closest('.flow-node');
                if (!nodeEl) return;
                const node = flow.nodes.find((item) => item.id === nodeEl.dataset.nodeId);
                if (!node) return;
                selectedNodeId = node.id;
                if (event.target.closest('button, textarea, input, select, .port')) {
                    renderOutputPanel();
                    renderContextEditor();
                    return;
                }
                let startedDrag = false;
                if (event.target.closest('.node-header') && !event.target.closest('button')) {
                    draggingNode = {
                        id: node.id,
                        startX: event.clientX,
                        startY: event.clientY,
                        nodeX: node.x,
                        nodeY: node.y,
                    };
                    activeSource = nodeEl;
                    startedDrag = true;
                    nodeEl.classList.add('selected');
                    event.preventDefault();
                }
                renderOutputPanel();
                if (!startedDrag) renderNodes();
            });

            document.addEventListener('pointermove', (event) => {
                if (resizingRightPanel) {
                    const nextWidth = resizingRightPanel.startWidth - (event.clientX - resizingRightPanel.startX);
                    setRightPanelWidth(nextWidth, false);
                }
                if (pendingEdge) {
                    const point = clientToCanvas(event.clientX, event.clientY);
                    pendingEdge.x = point.x;
                    pendingEdge.y = point.y;
                    pendingEdge.moved = pendingEdge.moved || Math.hypot(event.clientX - pendingEdge.startX, event.clientY - pendingEdge.startY) > 8;
                    renderEdges();
                }
                if (panning) {
                    $('canvasViewport').scrollLeft = panning.scrollLeft - (event.clientX - panning.startX);
                    $('canvasViewport').scrollTop = panning.scrollTop - (event.clientY - panning.startY);
                }
            });

            document.addEventListener('pointerup', (event) => {
                if (resizingRightPanel) {
                    const currentWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--right-panel-width'), 10) || resizingRightPanel.startWidth;
                    setRightPanelWidth(currentWidth, true);
                    resizingRightPanel = null;
                    $('rightResizer').classList.remove('resizing');
                    document.body.classList.remove('resizing-right-panel');
                }
                if (pendingEdge) {
                    const targetEl = document.elementFromPoint(event.clientX, event.clientY);
                    const inputPort = targetEl?.closest?.('[data-port="in"]');
                    const targetNode = inputPort?.closest?.('.flow-node')?.dataset.nodeId;
                    const source = pendingEdge.source;
                    const wasMoved = pendingEdge.moved;
                    pendingEdge = null;
                    if (targetNode) {
                        connectNodes(source, targetNode);
                        setTimeout(() => { suppressPortClick = false; }, 0);
                    } else if (wasMoved) {
                        connectingFrom = null;
                        toast('没有连接到输入端口');
                        renderAll();
                        setTimeout(() => { suppressPortClick = false; }, 0);
                    } else {
                        connectingFrom = source;
                        renderNodes();
                        renderEdges();
                    }
                }
                if (panning) {
                    panning = null;
                    $('canvasViewport').style.cursor = '';
                }
            });

            document.addEventListener('mousemove', (event) => {
                if (!draggingNode) return;
                const node = flow.nodes.find((item) => item.id === draggingNode.id);
                if (!node || !activeSource) return;
                node.x = Math.max(0, draggingNode.nodeX + event.clientX - draggingNode.startX);
                node.y = Math.max(0, draggingNode.nodeY + event.clientY - draggingNode.startY);
                activeSource.style.left = `${node.x}px`;
                activeSource.style.top = `${node.y}px`;
                renderEdges();
            });

            document.addEventListener('mouseup', () => {
                if (draggingNode) saveFlow();
                draggingNode = null;
                activeSource = null;
            });

            $('nodesLayer').addEventListener('click', (event) => {
                const fileButton = event.target.closest('[data-file-action]');
                if (fileButton) {
                    const path = fileButton.dataset.path;
                    fileButton.dataset.fileAction === 'view' ? viewFile(path) : downloadFile(path);
                    event.stopPropagation();
                    return;
                }

                const nodeEl = event.target.closest('.flow-node');
                if (!nodeEl) return;
                if (suppressPortClick && !event.target.closest('[data-port="out"]')) {
                    suppressPortClick = false;
                }
                const nodeId = nodeEl.dataset.nodeId;
                if (event.target.closest('[data-action="upload-node-context"]')) {
                    selectedNodeId = nodeId;
                    renderOutputPanel();
                    renderContextEditor();
                    $('contextFileInput').click();
                    return;
                }
                if (event.target.closest('[data-action="delete-node"]')) {
                    removeNode(nodeId);
                    return;
                }
                if (event.target.dataset.port === 'out') {
                    if (suppressPortClick) {
                        suppressPortClick = false;
                        return;
                    }
                    connectingFrom = connectingFrom === nodeId ? null : nodeId;
                    renderNodes();
                    return;
                }
                if (event.target.dataset.port === 'in') {
                    suppressPortClick = false;
                    connectNodes(connectingFrom, nodeId);
                    return;
                }
                selectNode(nodeId);
            });

            $('nodesLayer').addEventListener('input', (event) => {
                if (event.target.dataset.field !== 'prompt') return;
                const nodeEl = event.target.closest('.flow-node');
                const node = flow.nodes.find((item) => item.id === nodeEl.dataset.nodeId);
                if (!node) return;
                node.prompt = event.target.value;
                saveFlow();
            });

            $('edgeLayer').addEventListener('click', (event) => {
                const edgeId = event.target.dataset.edgeId;
                if (edgeId) removeEdge(edgeId);
            });

            $('contextEditor').addEventListener('click', (event) => {
                const action = event.target.dataset.contextAction;
                if (!action) return;
                if (action === 'add') addSelectedContextFile();
                if (action === 'upload') $('contextFileInput').click();
                if (action === 'preview-stage') previewStageContext();
                if (action === 'remove') removeContextFile(Number(event.target.dataset.index));
                if (action === 'view') {
                    const node = selectedNode();
                    const file = node?.attachments?.[Number(event.target.dataset.index)];
                    if (file?.path) viewFile(file.path);
                }
            });

            $('contextEditor').addEventListener('change', (event) => {
                const node = selectedNode();
                if (!node) return;
                if (event.target.id === 'stageContextToggle') {
                    node.stageContextEnabled = event.target.checked;
                    saveFlow();
                    renderAll();
                }
            });

            $('contextEditor').addEventListener('input', (event) => {
                const node = selectedNode();
                if (!node || event.target.id !== 'customContextInput') return;
                node.customContext = event.target.value;
                saveFlow();
                renderNodes();
            });

            document.querySelectorAll('[data-upload]').forEach((button) => {
                button.addEventListener('click', () => showUploadModal(button.dataset.upload));
            });
            document.querySelectorAll('[data-engine]').forEach((button) => {
                button.addEventListener('click', () => setBackendEngine(button.dataset.engine));
            });
            document.querySelectorAll('[data-close-modal]').forEach((button) => {
                button.addEventListener('click', () => $(button.dataset.closeModal).classList.remove('show'));
            });

            $('runFlowBtn').addEventListener('click', runWorkflow);
            $('stopFlowBtn').addEventListener('click', stopWorkflow);
            $('sendCmdBtn').addEventListener('click', sendCommand);
            $('cmdInput').addEventListener('keydown', (event) => { if (event.key === 'Enter') sendCommand(); });
            $('aiApiKey').addEventListener('input', saveAiSettings);
            $('aiBaseUrl').addEventListener('input', saveAiSettings);
            $('refreshDesignsBtn').addEventListener('click', refreshDesigns);
            $('designSelect').addEventListener('change', (event) => switchDesign(event.target.value));
            $('openFilesBtn').addEventListener('click', openFilesModal);
            $('refreshSnapshotBtn').addEventListener('click', restoreLastRun);
            $('zoomHomeBtn').addEventListener('click', centerCanvas);
            $('autoLayoutBtn').addEventListener('click', autoLayout);
            $('addDefaultBtn').addEventListener('click', resetToDefault);
            $('clearFlowBtn').addEventListener('click', clearFlow);
            $('doUploadBtn').addEventListener('click', uploadSelectedFile);
            $('dropZone').addEventListener('click', () => $('fileInput').click());
            $('fileInput').addEventListener('change', (event) => {
                selectedUploadFile = event.target.files[0] || null;
                $('dropText').textContent = selectedUploadFile ? selectedUploadFile.name : '选择文件';
                if (selectedUploadFile && uploadType === 'rtl') {
                    $('designName').value = selectedUploadFile.name.replace(/\.[^.]+$/, '');
                }
            });
            $('contextFileInput').addEventListener('change', (event) => {
                const file = event.target.files[0] || null;
                event.target.value = '';
                uploadContextFile(file);
            });
            $('downloadCurrentBtn').addEventListener('click', () => currentViewFile && downloadFile(currentViewFile));

            document.addEventListener('click', (event) => {
                const fileButton = event.target.closest('#fileTree [data-file-action]');
                if (!fileButton) return;
                const path = fileButton.dataset.path;
                fileButton.dataset.fileAction === 'view' ? viewFile(path) : downloadFile(path);
            });

            window.addEventListener('resize', () => {
                const currentWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--right-panel-width'), 10) || 360;
                setRightPanelWidth(currentWidth, false);
            });
        }

        function boot() {
            restoreRightPanelWidth();
            loadAiSettings();
            renderPalette();
            loadFlow();
            wireEvents();
            renderAll();
            centerCanvas();
            setBackendEngine(backendEngine);
            refreshDesigns();
            refreshTools();
            refreshContextFiles();
            restoreLastRun();
            setInterval(refreshTools, 30000);
        }

        boot();
    </script>
</body>
</html>
